<article class="long-testimonial-card reveal">
  <div class="long-testimonial-card__header">
    <span class="long-testimonial-card__quote">{{{quoteIcon}}}</span>
    <div>
      <h3>{{author}}</h3>
      <p>{{excerpt}}</p>
    </div>
  </div>
  <details>
    <summary>{{summaryLabel}}</summary>
    <div class="long-testimonial-card__body">{{{bodyHtml}}}</div>
  </details>
</article>
