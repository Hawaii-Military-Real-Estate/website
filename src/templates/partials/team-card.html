<div class="agent-card reveal" data-agent-card data-agent-name="{{name}}" {{{sortAttribute}}}>
  <div class="media">
    <img src="{{prefix}}assets/{{image}}" alt="{{name}}" loading="lazy" />
    <div class="overlay">
      <h3>{{name}}</h3>
      <div class="yr">{{cardMeta}}</div>
    </div>
  </div>
  <div class="body">
    <div class="role">{{cardRole}}</div>
    <a href="{{profileHref}}">View Profile -></a>
  </div>
</div>
