<div class="t-card">
  <div class="top">
    <img src="assets/{{image}}" alt="{{name}}" />
    <div>
      <div class="name">{{name}}</div>
      <div class="role">{{role}}</div>
    </div>
    <span class="q">{{{quoteIcon}}}</span>
  </div>
  <div class="stars">{{{starsHtml}}}</div>
  <p class="quote">"{{quote}}"</p>
</div>
