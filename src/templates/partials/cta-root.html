<section class="cta-band">
  <div class="box">
    <img class="bg" src="{{prefix}}assets/cta-sunset.jpg" alt="" loading="lazy" />
    <div class="ovr"></div>
    <div class="inner">
      <div class="eyebrow-pill"><span
          style="width:6px;height:6px;border-radius:999px;background:#fff;display:inline-block;animation:pulse 2s ease-in-out infinite"></span>
        {{eyebrow}}</div>
      <h2>{{title}}</h2>
      <p>{{subtitle}}</p>
      <div class="row">
        <a class="btn-white" href="{{phoneHref}}">{{{phoneIcon}}} {{primaryLabel}} {{{arrowRightIcon}}}</a>
        <a class="btn-ghost" href="mailto:{{email}}">{{{mailIcon}}} {{secondaryLabel}}</a>
      </div>
      <p class="note">{{note}}</p>
    </div>
  </div>
</section>
