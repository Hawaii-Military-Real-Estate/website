<section class="cta-wrap">
  <div class="cta">
    <img src="{{prefix}}assets/cta-sunset.jpg" alt="" aria-hidden="true" loading="lazy" width="1920" height="1080" />
    <div class="cta-inner">
      <div class="copy reveal">
        <span class="pill"><span class="dot"></span> {{eyebrow}}</span>
        <h2>{{title}}</h2>
        <p>{{subtitle}}</p>
        <div class="cta-actions">
          <a href="{{phoneHref}}" class="btn btn-white btn-lg">{{{phoneIcon}}} {{primaryLabel}} {{{arrowRightIcon}}}</a>
          <a href="mailto:{{email}}" class="btn btn-ghost-light btn-lg">{{{mailIcon}}} {{secondaryLabel}}</a>
        </div>
        <p class="cta-note">{{note}}</p>
      </div>
    </div>
  </div>
</section>
