<main style="display:grid;place-items:center;min-height:60vh;padding:4rem 1rem;text-align:center">
  <div style="max-width:28rem">
    <h1 style="font-size:5rem;line-height:1">{{heading}}</h1>
    <h2 style="margin-top:.75rem">{{subheading}}</h2>
    <p style="margin-top:.5rem;color:var(--muted-fg)">{{text}}</p>
    <a href="index.html" class="btn btn-primary" style="margin-top:1.5rem">{{linkLabel}}</a>
  </div>
</main>
