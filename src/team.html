<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Our Agents – Meet the Hawaii Military Real Estate Team</title>
  <meta name="description"
    content="Experienced, local, and dedicated REALTORS® serving military families on Oahu and beyond.">
  <link rel="canonical" href="/team.html">
  <meta property="og:title" content="Our Team · Hawaii Military Real Estate">
  <meta property="og:description" content="Military-connected agents who get the Hawaii market.">
  <meta property="og:url" content="/team.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <div id="site-header"></div>
  <main>

    <section class="page-hero">
      <div class="bg"><img src="assets/images/hero-bg-team.jpg" alt="" aria-hidden="true"></div>
      <div class="page-hero-inner reveal">
        <span class="eyebrow-glass"><span
            style="width:6px;height:6px;border-radius:999px;background:currentColor;opacity:.7"></span> Our
          Agents</span>
        <h1>Experienced. Local. Dedicated.</h1>
        <p class="intro">Each agent is military-connected or brings years of Hawaii real estate experience. We work
          together to give you the best possible service.</p>
      </div>
    </section>

    <section class="section">
      <div class="container team-grid" id="team-grid"></div>
    </section>

    <div id="site-cta" data-title="Ready to Work With an Agent?"
      data-subtitle="Call or text and we'll match you with the perfect team member."
      data-note="We respond 7 days a week."></div>
  </main>
  <div id="site-footer"></div>

  <script>
    const AGENTS = [
      {
        name: "David Kucic", role: "Broker / Military Relocation Expert", years: "12 yrs Army · 8 yrs RE", image: "assets/images/agent-1.jpg", email: "david@yourcompany.com",
        bio: "After 12 years in the U.S. Army with two tours at Schofield Barracks, David built his real estate practice around what he knows best: helping military families land softly in Hawaii.",
        specialties: ["VA Loans", "PCS Relocation", "Oahu Market", "Investment Properties"]
      },
      {
        name: "Tonya Kucic", role: "Co-Broker / Luxury & Neighborhood Specialist", years: "15+ yrs RE", image: "assets/images/agent-2.jpg", email: "tonya@yourcompany.com",
        bio: "Honolulu-born and raised, Tonya brings 15+ years of local insight and a sharp eye for negotiation, staging, and marketing high-end island homes.",
        specialties: ["Luxury Homes", "Staging & Marketing", "Negotiation", "Local Neighborhoods"]
      },
      {
        name: "Mike Sullivan", role: "Realtor / VA Loan Certified", years: "Former Marine · 6 yrs RE", image: "assets/images/agent-3.jpg", email: "mike@yourcompany.com",
        bio: "A former Marine, Mike speaks the language of service. He guides veterans and active-duty buyers through every step of the VA loan process.",
        specialties: ["VA Certified", "First-Time Buyers", "Veterans", "West Oahu"]
      },
      {
        name: "Sarah Jenkins", role: "Realtor / Property Management Director", years: "10 yrs RE", image: "assets/images/agent-4.jpg", email: "sarah@yourcompany.com",
        bio: "Sarah runs our property management division, making sure deployed and out-of-state owners have full peace of mind year-round.",
        specialties: ["Property Management", "Tenant Placement", "Rental Strategy", "Maintenance"]
      },
      {
        name: "James \"Kimo\" Lee", role: "Realtor / Oahu & Big Island Expert", years: "12 yrs RE", image: "assets/images/agent-5.jpg", email: "kimo@yourcompany.com",
        bio: "Born on the Big Island and raised on Oahu, Kimo knows every neighborhood worth knowing · and the local-only spots, too.",
        specialties: ["Big Island", "Country Properties", "Land", "Local Knowledge"]
      },
      {
        name: "Rachel Okamoto", role: "Buyer's Agent / Military Spouse Specialist", years: "5 yrs RE", image: "assets/images/agent-6.jpg", email: "rachel@yourcompany.com",
        bio: "A proud military spouse herself, Rachel works exclusively with buyers · with patience, care, and a real understanding of military life.",
        specialties: ["Military Spouses", "Buyer's Agent", "School Districts", "Family Homes"]
      }
    ];
    document.addEventListener("DOMContentLoaded", () => {
      const host = document.getElementById("team-grid");
      host.innerHTML = AGENTS.map(a => `
      <article class="agent reveal">
        <div class="pic">
          <img src="${a.image}" alt="${a.name}" loading="lazy" width="600" height="750">
          <div class="name"><h3>${a.name}</h3><p>${a.years}</p></div>
        </div>
        <div class="info">
          <p class="role">${a.role}</p>
          <button class="view" data-agent='${JSON.stringify(a).replace(/'/g, "&#39;")}'>View Profile →</button>
        </div>
      </article>`).join("");
      // re-trigger reveal observer after insertion
      document.querySelectorAll(".reveal").forEach(n => n.classList.remove("in"));
      if (window.__rebind) window.__rebind();
    });
  </script>
  <script src="assets/js/site.js" defer></script>
</body>

</html>
